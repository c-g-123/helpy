{% extends 'core/base.html' %}
{% block title %}Projects{% endblock %}

{% block body %}
    <div class="card">
        <a href="{% url 'core:create_project' %}">Create Project</a>
    </div>
    <ul>
        {% for project in projects %}
            <li>
                <div class="card">
                    <a href="{% url 'core:project' project.id %}">
                        {{ project.name }}
                    </a>
                </div>
            </li>
        {% empty %}
            <p>You have no projects yet.</p>
        {% endfor %}
    </ul>
{% endblock %}
