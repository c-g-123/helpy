{% extends 'core/base.html' %}

{% block title_block %}
    Login
{% endblock %}

{% block body_block %}
    <h1>Login</h1>
    <form id="login_form" method="post" action="{% url 'core:login' %}">
        {% csrf_token %}
        Username: <input type="text" name="username" value="" size="50"/>
        <br/>
        Password: <input type="password" name="password" value="" size="50"/>
        <br/>
        {% if error_message %}
            {{ error_message }}
        {% endif %}
        <br/>
        <input type="submit" value="Login" />
    </form>
{% endblock %}
